name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run tests
        run: python -m pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: family-menu/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: family-menu/frontend
        run: npm ci

      - name: Build frontend
        working-directory: family-menu/frontend
        run: npm run build

  home-assistant-image-build:
    name: Home Assistant add-on image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read add-on version
        id: addon
        run: |
          version="$(awk -F'"' '/^version:/ {print $2}' family-menu/config.yaml)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build aarch64 image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./family-menu
          platforms: linux/arm64
          push: false
          build-args: |
            BUILD_ARCH=aarch64
            BUILD_VERSION=${{ steps.addon.outputs.version }}
          tags: ghcr.io/kmcrandom/family-menu-ha:${{ steps.addon.outputs.version }}
